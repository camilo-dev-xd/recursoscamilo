<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Web y Multimedia</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <header class="header">
        <div class="header-content">
            <h1>Directorio de Recursos</h1>
            <p>Descubre herramientas, inspiración y recursos para tus proyectos creativos.</p>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar recursos...">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="filters-section">
            <h2 class="sr-only">Filtrar por categorías</h2>
            <div class="filters-container" id="filters-container">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <!-- Categorías generadas dinámicamente -->
            </div>
        </section>

        <section class="resources-section">
            <div class="grid-container" id="resources-grid">
                <!-- Tarjetas de recursos generadas dinámicamente -->
            </div>
            
            <div id="no-results" class="no-results hidden">
                <p>No se encontraron recursos que coincidan con tu búsqueda.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; Directorio de Recursos Web y Multimedia</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
